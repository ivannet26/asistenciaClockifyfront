<div class="rastreador-pagina">
    <div class="rastreador-panel">
        <div class="barra-rastreador">

            <div class="tarea-proyecto-seccion">
                <div class="input-seccion">
                    <input type="text" pInputText placeholder="¿En qué estás trabajando?" class="input-tarea"
                        [(ngModel)]="tareaActual" />
                </div>
                <div class="proyecto-seccion">
                    <button pButton type="button" class="p-button-text boton-proyecto"
                        (click)="panelProyectos.toggle($event)">

                        <div class="flex align-items-center gap-2">
                            <div *ngIf="proyectoSeleccionado" [style.background]="proyectoSeleccionado.color"
                                style="width: 10px; height: 10px; border-radius: 50%;">
                            </div>

                            <i *ngIf="!proyectoSeleccionado" class="pi pi-plus icono-proyecto"></i>

                            <span class="texto-proyecto">
                                {{ proyectoSeleccionado?.nombre || 'Proyecto' }}
                            </span>
                        </div>
                    </button>
                </div>
            </div>

            <div class="acciones-seccion">
                <button pButton icon="pi pi-tag" class="p-button-text"></button>

                <div class="divisor-vertical"></div>
                
                <button pButton class="p-button-text boton-dolar" (click)="alternarFacturable()">
                    <i class="pi pi-dollar" [ngClass]="esFacturable ? 'icono-activo' : 'icono-inactivo'">
                    </i>
                </button>

                <div class="divisor-vertical"></div>

                <span class="timer-display">{{ tiempoTranscurrido }}</span>

                <div class="botones-control">
                    <button pButton [label]="corriendo ? 'DETENER' : 'INICIO'"
                        [ngClass]="corriendo ? 'p-button-danger' : 'p-button-info'" (click)="toggleTimer()">
                    </button>

                    <button pButton icon="pi pi-ellipsis-v" class="p-button-text" (click)="menuModos.toggle($event)">
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div style="height: 20px;"></div>

    <div *ngIf="registros.length > 0" class="contenedor-lista">

        <div class="cabecera-tiempo">
            <span>Hoy</span>
            <span>Total: {{ totalHoy }}</span>
        </div>

        <div *ngFor="let r of registros" class="registro-item">
            <div class="registro-contenido">
                
                <div class="registro-izquierda">
                    <input type="text" pInputText [(ngModel)]="r.descripcion" class="input-descripcion" />
                </div>

                <div class="registro-centro">
                    <div class="color-dot" [style.background]="r.proyecto?.color"></div>

                    <span class="proyecto-nombre">
                        {{ r.proyecto?.nombre || 'Sin proyecto' }}
                    </span>

                    <i class="pi pi-tag icono-suave"></i>

                    <i class="pi pi-dollar" [ngClass]="r.facturable ? 'icono-activo' : 'icono-inactivo'"></i>

                    <span class="hora-rango">
                        {{ formatearHora(r.inicio) }} - {{ formatearHora(r.fin) }}
                    </span>

                    <i class="pi pi-calendar icono-suave"></i>

                    <strong class="duracion">{{ r.duracion }}</strong>
                </div>

                <div class="registro-derecha">
                    <button pButton icon="pi pi-play" class="p-button-text"></button>
                    <button pButton icon="pi pi-ellipsis-v" class="p-button-text"></button>
                </div>

            </div>
        </div>
    </div>
</div>

<p-overlayPanel #panelProyectos [style]="{ width: '320px' }">
    <div class="flex flex-column gap-3">
        <span class="p-input-icon-left w-full">
            <i class="pi pi-search"></i>
            <input type="text" pInputText placeholder="Buscar Proyecto o Cliente" [(ngModel)]="busquedaProyecto"
                class="w-full p-inputtext-sm" />
        </span>

        <div *ngIf="proyectos.length > 0; else sinProyectos">
            <div *ngFor="let proyecto of proyectos"
                class="flex align-items-center justify-content-between p-2 border-round cursor-pointer hover:bg-100"
                (click)="seleccionarProyecto(proyecto, panelProyectos)">

                <div class="flex align-items-center gap-2">
                    <div [style.background]="proyecto.color" style="width: 12px; height: 12px; border-radius: 50%;"></div>
                    <span>{{ proyecto.nombre }}</span>
                </div>
                <i class="pi pi-chevron-right"></i>
            </div>
        </div>

        <ng-template #sinProyectos>
            <div class="p-3 text-center">No hay proyectos creados</div>
        </ng-template>

        <button pButton label="Crear nuevo Proyecto" icon="pi pi-plus-circle" class="p-button-text p-button-info w-full"
            (click)="panelProyectos.hide(); abrirModalNuevoProyecto()">
        </button>
    </div>
</p-overlayPanel>

<p-dialog header="Crear nuevo Proyecto" [(visible)]="mostrarModalProyecto" [modal]="true"
    [closable]="true" [draggable]="false" [resizable]="false">

    <div class="form-grid">
        <input pInputText placeholder="Introduce el nombre de Proyecto" [(ngModel)]="nuevoProyecto.nombre"
            class="input-full" />

        <p-dropdown 
            [options]="clientes" 
            optionLabel="nombre" 
            optionValue="code" 
            [(ngModel)]="nuevoProyecto.cliente"
            placeholder="Seleccionar cliente" 
            [scrollHeight]="'200px'" 
            class="input-full"
            appendTo="body">
        </p-dropdown>

        <div class="color-box">
            <input type="color" [(ngModel)]="nuevoProyecto.color" />
        </div>

        <div class="publico-box">
            <p-checkbox [(ngModel)]="nuevoProyecto.publico" binary="true"></p-checkbox>
            <label class="ml-2">Público</label>
        </div>

        <p-dropdown 
            [options]="plantillas" 
            optionLabel="nombre" 
            optionValue="code" 
            [(ngModel)]="nuevoProyecto.plantilla"
            placeholder="Sin plantilla" 
            [scrollHeight]="'200px'" 
            appendTo="body" 
            class="input-full">
        </p-dropdown>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <button pButton label="Cancelar" class="p-button-text" (click)="mostrarModalProyecto = false">
            </button>
            <button pButton label="CREAR" class="p-button-info" (click)="guardarProyecto()">
            </button>
        </div>
    </ng-template>
</p-dialog>

<p-overlayPanel #menuModos [style]="{ width: '220px' }">
    <div class="flex flex-column">
        <div class="p-2 hover:bg-100 cursor-pointer flex align-items-center gap-2">
            <i class="pi pi-clock"></i>
            <span>Modo temporizador</span>
        </div>
        <div class="p-2 hover:bg-100 cursor-pointer flex align-items-center gap-2">
            <i class="pi pi-pencil"></i>
            <span>Modo manual</span>
        </div>
    </div>
</p-overlayPanel>
