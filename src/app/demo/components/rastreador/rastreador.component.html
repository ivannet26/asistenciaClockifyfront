<div class="rastreador-pagina">
    <div class="rastreador-panel">

        <div class="barra-rastreador">
            <div class="tarea-proyecto-seccion">
                <div class="input-seccion">
                    <input type="text" pInputText placeholder="¿En qué estás trabajando?" class="input-tarea" />
                </div>

                <div class="proyecto-seccion">
                    <button pButton type="button" class="p-button-text boton-proyecto">

                        <i class="pi pi-plus icono-proyecto"></i>
                        <span class="texto-proyecto">Proyecto</span>

                    </button>
                </div>
            </div>

            <div class="acciones-seccion">
                <button pButton icon="pi pi-tag" class="p-button-text p-button-secondary"></button>
                <div class="divisor-vertical"></div>
                <button pButton icon="pi pi-dollar" class="p-button-text p-button-secondary"></button>
                <div class="divisor-vertical"></div>

                <span class="timer-display">00:00:00</span>

                <div class="botones-control">
                    <button pButton label="INICIO" class="p-button-info boton-inicio">
                    </button>

                    <button pButton icon="pi pi-ellipsis-v" class="p-button-text p-button-secondary"></button>
                </div>

            </div>
        </div>

        <div class="rastreador-contenido-central">
            <p-card class="tarjeta-bienvenida">
                <div class="flex flex-column align-items-center text-center p-4">
                    <div class="icono-reloj mb-3">
                        <i class="pi pi-clock" style="font-size: 5rem; color: #03a9f4;"></i>
                    </div>

                    <h2 class="titulo-bienvenida">¡Empecemos a rastrear!</h2>
                    <div class="divisor-horizontal w-full mb-3"></div>
                    <h3 class="texto-secundario">
                        Click en inicio para empezar el contador.
                    </h3>
                </div>
            </p-card>
        </div>
    </div>
</div>
