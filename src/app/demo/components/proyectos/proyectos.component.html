<div class="grid p-fluid">
    <div class="col-12">
        <div class="card shadow-2 p-0 overflow-hidden border-1 surface-border bg-white">

            <div class="flex justify-content-between align-items-center p-4">
                <h2 class="m-0 font-normal text-900" style="font-size: 1.5rem;">Proyectos</h2>
                <button pButton label="Crear" class="p-button-info p-button-sm px-3 py-2 font-bold"
                    icon="pi pi-plus"  (click)="abrirModalNuevoProyecto()" style="width: auto; border-radius: 4px;font-weight: bold">
                </button>
            </div>
            <div class="surface-0 border-y-1 surface-border">
                <div class="flex align-items-stretch w-full">

                    <div class="flex align-items-center px-4 border-right-1 surface-border bg-gray-50"
                        style="border-right-style: dashed !important; min-width: 120px;">
                        <span class="text-500 font-bold text-xs uppercase">Filtrar</span>
                    </div>

                    <div class="flex-1 flex align-items-center border-right-1 surface-border"
                        style="border-right-style: dashed !important;">
                        <p-dropdown [options]="[{label:'Activo', value:'A'}]" placeholder="Activo"
                            [style]="{'border':'none', 'background':'transparent', 'width':'100%', 'color':'#334155', 'font-weight':'700'}"
                            class="w-full">
                        </p-dropdown>
                    </div>

                    <div class="flex-1 flex align-items-center border-right-1 surface-border"
                        style="border-right-style: dashed !important;">
                        <button pButton label="Cliente" icon="pi pi-chevron-down" iconPos="right"
                            class="p-button-text w-full text-700 font-bold"
                            style="justify-content: space-between; color: #334155 !important; padding: 0.75rem 1rem; border: none;"
                            (click)="opCliente.toggle($event)">
                        </button>
                    </div>

                    <div class="flex-1 flex align-items-center border-right-1 surface-border"
                        style="border-right-style: dashed !important;">
                        <button pButton label="Acceso" icon="pi pi-chevron-down" iconPos="right"
                            class="p-button-text w-full text-700 font-bold"
                            style="justify-content: space-between; color: #334155 !important; padding: 0.75rem 1rem; border: none;"
                            (click)="opAcceso.toggle($event)">
                        </button>
                    </div>

                    <div class="flex-1 flex align-items-center">
                        <p-dropdown [options]="[]" placeholder="Facturación"
                            [style]="{'border':'none', 'background':'transparent', 'width':'100%', 'color':'#334155', 'font-weight':'700'}"
                            class="w-full">
                        </p-dropdown>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-white border-bottom-1 surface-border">
                <div class="flex align-items-center gap-2">
                    <div class="flex-1 flex align-items-center border-1 surface-border border-round px-2 bg-white">
                        <i class="pi pi-search text-400 mx-2"></i>
                        <input type="text" pInputText placeholder="Buscar por nombre"
                            class="border-none w-full shadow-none py-2 text-sm">
                    </div>
                    <button pButton label="Aplicar" class="p-button-info p-button-sm text-xs py-2 px-4 w-auto"
                        style="width: auto; height: 38px; border-radius: 4px; font-weight: bold;"></button>
                </div>
            </div>

            <div class="m-3 border-1 surface-border border-round overflow-hidden">
                <div
                    class="surface-100 p-2 flex justify-content-between align-items-center border-bottom-1 surface-border">
                    <span class="text-xs font-bold text-500 ml-2 uppercase">Proyectos</span>
                    <button pButton label="Exportar" icon="pi pi-chevron-down" iconPos="right"
                        class="p-button-info p-button-sm text-xs py-1 px-3 w-auto"
                        style="border-radius: 4px; font-weight: bold;"></button>
                </div>

                <p-table [value]="proyectos" ] class="p-datatable-sm">
                    <ng-template pTemplate="header">
                        <tr>
                            <th style="width: 3rem" class="text-center bg-white border-bottom-1 surface-border">
                                <p-checkbox [binary]="true"></p-checkbox>
                            </th>
                            <th class="bg-white text-500 font-bold text-xs uppercase border-bottom-1 surface-border">
                                Nombre
                            </th>
                            <th class="bg-white text-500 font-bold text-xs uppercase border-bottom-1 surface-border">
                                Cliente
                            </th>
                            <th class="bg-white text-500 font-bold text-xs uppercase border-bottom-1 surface-border">
                                Registrado
                            </th>
                            <th class="bg-white text-500 font-bold text-xs uppercase border-bottom-1 surface-border">
                                Importe
                            </th>
                            <th class="bg-white text-500 font-bold text-xs uppercase border-bottom-1 surface-border">
                                Progreso
                            </th>
                            <th class="bg-white text-500 font-bold text-xs uppercase border-bottom-1 surface-border">
                                Acceso
                            </th>
                            <th class="bg-white text-500 font-bold text-xs uppercase border-bottom-1 surface-border"
                                colspan="2">
                            </th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-proyecto>
                        <tr class="hover:surface-50">
                            <td class="text-center border-none">
                                <p-checkbox [binary]="true"></p-checkbox>
                            </td>

                            <td class="flex  align-items-center">
                                <span class="text-700 font-medium">
                                    <div [style.background]="proyecto.color"
                                        style="width:10px; height:10px; margin: 15px 5px; border-radius:30px;">
                                    </div>
                                </span>
                                <span class="text-700 font-medium">{{proyecto.nombre}}</span>
                            </td>
                            <td>
                                <span class="text-700 font-medium">
                                    {{ proyecto.cliente || 'Sin cliente' }}
                                </span>
                            </td>
                            <td>
                                <span class="text-700 font-medium">0,00h</span>
                            </td>
                            <td>
                                <span class="text-700 font-medium">0,00 USD</span>
                            </td>
                            <td>
                                <span class="text-700 font-medium">
                                    -
                                </span>
                            </td>
                            <td>
                                <span class="text-700 font-medium">
                                    {{ proyecto.publico ? 'Público' : 'Privado' }}
                                </span>
                            </td>
                            <td colspan="2">
                                <button pButton icon="pi pi-ellipsis-v" class="p-button-text p-button-secondary"
                                    (click)="menuFila.toggle($event)">
                                </button>

                                <p-overlayPanel #menuFila [style]="{ width: '200px' }">
                                    <div class="menu-fila">
                                        <div class="item-menu" (click)="dividirRegistro(proyecto); menuFila.hide()">
                                            <i class="pi pi-clone"></i>
                                            <span>Establecer como plantilla</span>
                                        </div>

                                        <div class="item-menu" (click)="duplicarRegistro(proyecto); menuFila.hide()">
                                            <i class="pi pi-copy"></i>
                                            <span>Archivar</span>
                                        </div>
                                    </div>
                                </p-overlayPanel>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        </div>
    </div>
</div>

<p-overlayPanel #opCliente [style]="{width: '350px'}">
    <div class="p-2 text-center py-5 text-500 italic">Todavía no hay clientes</div>
</p-overlayPanel>

<p-dialog header="Crear nuevo Proyecto" [(visible)]="mostrarModalProyecto" [modal]="true" [style]="{ width: '520px' }"
    [closable]="true" [draggable]="false" [resizable]="false">

    <div class="form-grid">
        <input pInputText placeholder="Introduce el nombre de Proyecto" [(ngModel)]="nuevoProyecto.nombre"
            class="input-full" />

        <p-dropdown 
            [options]="clientes" 
            optionLabel="nombre" 
            optionValue="code" 
            [(ngModel)]="nuevoProyecto.cliente"
            placeholder="Seleccionar cliente" 
            [scrollHeight]="'200px'" 
            class="input-full"
            appendTo="body">
        </p-dropdown>

        <div class="color-box">
            <input type="color" [(ngModel)]="nuevoProyecto.color" />
        </div>

        <div class="publico-box">
            <p-checkbox [(ngModel)]="nuevoProyecto.publico" binary="true"></p-checkbox>
            <label class="ml-2">Público</label>
        </div>

        <p-dropdown 
            [options]="plantillas" 
            optionLabel="nombre" 
            optionValue="code" 
            [(ngModel)]="nuevoProyecto.plantilla"
            placeholder="Sin plantilla" 
            [scrollHeight]="'200px'" 
            appendTo="body" 
            class="input-full">
        </p-dropdown>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-content-end gap-2">
            <button pButton label="Cancelar" class="p-button-text" (click)="mostrarModalProyecto = false">
            </button>
            <button pButton label="CREAR" class="p-button-info" (click)="guardarProyecto()">
            </button>
        </div>
    </ng-template>
</p-dialog>

<p-overlayPanel #opAcceso [style]="{width: '350px'}">
    <div class="p-2">
        <div class="flex align-items-center p-1">
            <p-checkbox [binary]="true" label="Alejandra" class="mr-2"></p-checkbox>
        </div>
    </div>
</p-overlayPanel>
