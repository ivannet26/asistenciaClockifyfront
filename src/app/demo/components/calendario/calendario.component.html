<div class="grid p-3 layout-calendario">
  <div class="col-12">
    <div class="calendar-header card">
      <div class="header-toolbar">
        <div class="view-buttons">
          <span class="titulo-calendario">CALENDARIO</span>
          <p-button label="Semana" size="small" [ngClass]="{ 'activo': vista === 'semana' }" (onClick)="vista = 'semana'"></p-button>
          <p-button label="Día" size="small" [ngClass]="{ 'activo': vista === 'dia' }" (onClick)="vista = 'dia'"></p-button>
        </div>

        <div class="nav-controls">
          <div class="left-controls">
            <p-button icon="pi pi-cog" [text]="true"></p-button>
            <p-button label="Compañeros" icon="pi pi-chevron-down" iconPos="right" [outlined]="true" (onClick)="op.toggle($event)"></p-button>
            <p-overlayPanel #op [style]="{ width: '300px' }" styleClass="custom-overlay" appendTo="body">
              <ng-template pTemplate="content">
                <div class="p-fluid">
                  <div class="p-inputgroup mb-3">
                    <span class="p-inputgroup-addon"><i class="pi pi-search"></i></span>
                    <input type="text" pInputText placeholder="Buscar compañeros de equipo" />
                  </div>
                  <div class="compañero-item cursor-pointer">
                    <span class="text-sm">UsuarioEjemplo</span>
                    <i class="pi pi-check text-green-500"></i>
                  </div>
                </div>
              </ng-template>
            </p-overlayPanel>
          </div>

          <div class="center-controls">
            <p-button label="Hoy" size="small" (onClick)="irHoy()"></p-button>
            <p-button icon="pi pi-chevron-left" [text]="true" (onClick)="irAnterior()"></p-button>
            <p-button icon="pi pi-chevron-right" [text]="true" (onClick)="irSiguiente()"></p-button>
            <p-calendar [(ngModel)]="fechaActual" (onSelect)="cambiarFecha($event)" [showIcon]="true" dateFormat="dd M yy" appendTo="body"></p-calendar>
          </div>
        </div>
      </div>
    </div>

    <div class="calendar-body card">
      <p-table [value]="horas" class="custom-table">
        <ng-template pTemplate="header">
          <tr>
            <th class="time-col">
              <div class="zoom-controls">
                <button class="zoom-btn" (click)="disminuirZoom()">-</button>
                <button class="zoom-btn" (click)="aumentarZoom()">+</button>
              </div>
            </th>
            <th *ngFor="let dia of diasSemana" class="day-col" [ngClass]="{ 'oculto': vista === 'dia' && !esHoy(dia.completa), 'hoy': esHoy(dia.completa) }">
              <div class="header-day text-center">
                {{ dia.nombre }}, {{ dia.fecha }}
                <span class="time-sub">00:00:00</span>
              </div>
            </th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-hora>
          <tr>
            <td class="time-col text-xs text-400 text-center">{{ hora }}</td>
            <td *ngFor="let dia of diasSemana" class="slot-cell" (click)="onSlotClick(dia, hora)" [ngClass]="{ 'oculto': vista === 'dia' && !esHoy(dia.completa) }" style="position: relative; height: 60px; border: 0.5px dashed #eee;">
              
              <ng-container *ngFor="let reg of registros">
                <div *ngIf="esMismoDia(reg.inicio, dia.completa) && esMismaHora(reg.inicio, hora)"
                     class="event-block"
                     [ngStyle]="calcularEstiloEvento(reg)"
                     (click)="$event.stopPropagation(); onSlotClick(dia, hora, reg)"
                     [pTooltip]="tip" tooltipPosition="bottom">
                  
                  <div class="font-bold text-xs white-space-nowrap overflow-hidden">{{ reg.descripcion }}</div>
                  <div style="font-size: 0.6rem;">{{ reg.proyecto?.nombre || reg.proyecto }}</div>

                  <ng-template #tip>
                    <div class="text-center p-2">
                      <div class="font-bold">{{ reg.descripcion }}</div>
                      <div class="text-xs">{{ calcularDuracion(reg) }} ({{ reg.inicio | date:'HH:mm' }} - {{ reg.fin | date:'HH:mm' }})</div>
                    </div>
                  </ng-template>
                </div>
              </ng-container>

            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>

<p-dialog [header]="registroActivo ? 'Editar entrada de tiempo' : 'Añadir entrada de tiempo'" [(visible)]="mostrarModal" [modal]="true" [style]="{ width: '550px' }">
  <div class="p-fluid">
    <div class="field mb-4">
      <label class="text-xs font-bold text-500 mb-2 block">Hora y fecha</label>
      <div class="flex gap-2 align-items-center">
        
        <input pInputText [value]="getDuracionTotalModal()" class="w-4 bg-gray-100 font-bold" readonly tabindex="-1" />
        
        <div class="flex border-1 border-300 border-round p-1 bg-gray-100 align-items-center">
          <input pInputText [ngModel]="duracionInicio" class="w-3rem border-none text-center p-1 bg-transparent" readonly tabindex="-1" />
          <span>-</span>
          <input pInputText [ngModel]="duracionFin" class="w-3rem border-none text-center p-1 bg-transparent" readonly tabindex="-1" />
        </div>

        <div class="p-inputgroup flex-grow-1">
          <input pInputText [value]="fechaSeleccionada | date:'dd/MM/yyyy'" class="bg-gray-100" readonly tabindex="-1" />
          <span class="p-inputgroup-addon bg-gray-100"><i class="pi pi-calendar"></i></span>
        </div>

      </div>
    </div>

    <div class="field mb-4">
      <label class="text-xs font-bold text-500 mb-2 block">Descripción</label>
      <textarea pInputTextarea [(ngModel)]="descripcionTarea" rows="4" placeholder="¿En qué has trabajado?"></textarea>
    </div>

    <div class="field grid mb-3 align-items-center">
      <label class="col-3 text-xs font-bold text-500">Proyecto</label>
      <div class="col-9">
        <p-dropdown [options]="listaProyectos" [(ngModel)]="proyectoSeleccionado" optionLabel="nombre" placeholder="Seleccionar proyecto" [showClear]="true"></p-dropdown>
      </div>
    </div>

    <div class="field grid mb-4 align-items-center">
      <label class="col-3 text-xs font-bold text-500">Etiquetas</label>
      <div class="col-9">
        <p-multiSelect [options]="listaEtiquetas" [(ngModel)]="etiquetasSeleccionadas" optionLabel="nombre" placeholder="Añadir etiquetas" display="chip"></p-multiSelect>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-between align-items-center border-top-1 border-200 pt-3">
      <i class="pi pi-ellipsis-v text-400"></i>
      <div class="flex gap-2">
        <p-button label="Cancelar" (onClick)="mostrarModal=false" class="p-button-text p-button-secondary"></p-button>
        <p-button label="Guardar" (onClick)="guardarEntrada()" class="p-button-text p-button-secondary"></p-button>
      </div>
    </div>
  </ng-template>
</p-dialog>
