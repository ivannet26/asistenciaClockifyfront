<p-toast></p-toast>

<div class="card p-4 shadow-1 border-round">
    <h2 class="text-900 font-bold mb-2">Panel de Administracion</h2>


    <p-table [value]="usuariosActivos" styleClass="p-datatable-gridlines" [responsiveLayout]="'scroll'">
        <ng-template pTemplate="header">
            <tr>
                <th style="background-color: #003366; color: white;">Usuario</th>
                <th style="background-color: #003366; color: white;">correo</th>
                <th style="background-color: #003366; color: white;">nombre y apellido</th>
                <th style="background-color: #003366; color: white;">dni</th>
                <th style="background-color: #003366; color: white;" class="text-center">estado temporizador</th>
                <th style="background-color: #003366; color: white;" class="text-center">Acción</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
            <tr>
                <td class="font-bold">{{user.usuario}}</td>
                <td class="text-blue-600">{{user.correo}}</td>
                <td>{{user.nombreCompleto}}</td>
                <td>{{user.dni}}</td>
                <td class="text-center">
                    <span class="font-bold text-green-600 mr-3">
                        {{ calcularTiempo(user.tiempoInicio) }}
                    </span>
                </td>
                <td class="text-center">
                    <button pButton label="Detener" class="p-button-danger font-bold px-4"
                        style="background-color: #cc0000; border: none;" (click)="detenerAsistencia(user)">
                    </button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="5" class="text-center p-5 text-500">
                    No hay conexiones activas en este momento.
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
