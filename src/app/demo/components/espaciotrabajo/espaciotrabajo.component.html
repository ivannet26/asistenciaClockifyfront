<div class="surface-ground flex align-items-center justify-content-center min-h-screen min-w-screen overflow-hidden">
    <div class="flex flex-column align-items-center justify-content-center">
        <div style="border-radius:56px; padding:0.3rem; background: linear-gradient(180deg, rgba(33, 150, 243, 0.4) 10%, rgba(33, 150, 243, 0) 30%);">
            <div class="w-full surface-card py-8 px-5 sm:px-8 flex flex-column align-items-center" style="border-radius:53px">
                <h1 class="text-900 text-blue-500 font-bold text-3xl lg:text-5xl mb-2">Espacios de Trabajo</h1>
                <div class="text-600 mb-5">Elige aquí tu espacio de trabajo</div>
                <a [routerLink]="['/menu-layout']" class="w-full flex align-items-center py-5 border-300 border-bottom-1">
                    <span class="flex justify-content-center align-items-center bg-cyan-600 border-round" style="height:3.5rem; width:3.5rem;">
                        <i class="pi pi-bars pi-backward text-50 text-2xl"></i>
                    </span>
                    <span class="ml-2 flex flex-column">
                        <span class="text-900 lg:text-xl font-medium mb-0">Click para ir a menu layout</span>
                    </span>
                </a>
            </div>
        </div>
    </div>
</div>
