<p-toast position="top-right" [baseZIndex]="9999" [preventOpenDuplicates]="true" />

<div class="micuenta-pagina">

    <!-- TÍTULO -->
    <h2 class="micuenta-titulo">Mi perfil</h2>

    <!-- CARD PRINCIPAL -->
    <div class="micuenta-card">

        <!-- Sección info personal -->
        <div class="seccion-header">
            <span class="seccion-label font-bold">Información personal</span>
            <p class="seccion-sub text-500 text-sm mt-1">
                Tus credenciales de inicio de sesión y el nombre mostrado en los informes.
            </p>
        </div>

        <!-- Avatar con iniciales -->
        <div class="avatar-bloque">
            <div class="avatar-circulo">
                {{ getIniciales() }}
            </div>
        </div>

        <!-- MODO VISTA -->
        <ng-container *ngIf="edicion == false">
            <div class="info-bloque">
                <div class="info-fila">
                    <span class="info-label">Nombre</span>
                    <span class="info-valor font-bold">{{ userData?.nombre }}</span>
                </div>
                <div class="info-fila">
                    <span class="info-label">Correo electrónico</span>
                    <span class="info-valor font-bold">{{ userData?.correo }}</span>
                </div>
                <div class="info-fila">
                    <span class="info-label">Rol</span>
                    <span class="info-valor font-bold">{{ userData?.rol ?? 'Sin rol' }}</span>
                </div>
            </div>

            <div class="botones-bloque">
                <button pButton label="Editar" icon="pi pi-pencil"
                    class="p-button-info boton-personalizado"
                    (click)="editarMiembro(true)">
                </button>
            </div>
        </ng-container>

        <!-- MODO EDICIÓN -->
        <ng-container *ngIf="edicion == true">
            <div class="info-bloque">
                <div class="info-fila">
                    <span class="info-label">Nombre</span>
                    <input type="text" pInputText [(ngModel)]="datosEditados.nombre"
                        class="w-full" />
                </div>
                <div class="info-fila">
                    <span class="info-label">Correo electrónico</span>
                    <input type="text" pInputText [(ngModel)]="datosEditados.correo"
                        class="w-full" />
                </div>
                <div class="info-fila">
                    <span class="info-label">Contraseña</span>
                    <p-password [toggleMask]="true"
                        weakLabel="muy simple"
                        mediumLabel="medianamente complejo"
                        strongLabel="Contraseña fuerte"
                        [(ngModel)]="datosEditados.contrasena"
                        styleClass="w-full" />
                </div>
            </div>

            <div class="botones-bloque flex gap-2">
                <button pButton label="Guardar" icon="pi pi-check"
                    class="p-button-success boton-personalizado"
                    (click)="guardarCambios()">
                </button>
                <button pButton label="Cancelar" icon="pi pi-times"
                    class="p-button-text p-button-secondary boton-personalizado"
                    (click)="editarMiembro(false)">
                </button>
            </div>
        </ng-container>

    </div>
</div>
