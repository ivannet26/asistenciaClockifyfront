<div class="grid p-3">
    <div class="col-12 mb-3 flex align-items-center justify-content-between">
        <h1 class="text-3xl font-bold m-0 text-900">Panel</h1>
        <div class="flex gap-2">
            <p-dropdown [options]="proyectos" placeholder="Proyecto" class="w-10rem"></p-dropdown>
            <p-dropdown [options]="usuarios" placeholder="Solo yo" class="w-10rem"></p-dropdown>
            <p-dropdown [options]="fechas" placeholder="Esta semana" class="w-12rem"></p-dropdown>
        </div>
    </div>

    <div class="col-12 md:col-9">
        <div class="card shadow-2 p-0">
            <div class="grid text-center m-0 border-bottom-1 border-200">
                <div class="col-4 p-4 border-right-1 border-200">
                    <span class="block text-500 font-medium mb-3">Tiempo total</span>
                    <div class="text-900 font-bold text-3xl">00:04:10</div>
                </div>
                <div class="col-4 p-4 border-right-1 border-200">
                    <span class="block text-500 font-medium mb-3">Proyecto principal</span>
                    <div class="text-900 font-bold text-3xl">gm</div>
                </div>
                <div class="col-4 p-4">
                    <span class="block text-500 font-medium mb-3">Principal Cliente</span>
                    <div class="text-900 font-bold text-3xl text-500">--</div>
                </div>
            </div>

            <div class="p-4">
                <p-chart type="bar" [data]="basicData" [options]="basicOptions" height="250px"></p-chart>
            </div>

            <div class="grid p-4 m-0 border-top-1 border-200">
                <div class="col-12 md:col-6 flex flex-column align-items-center justify-content-center">
                    <p-chart type="doughnut" [data]="doughnutData" [options]="doughnutOptions" height="200px"></p-chart>
                </div>
                <div class="col-12 md:col-6 pt-5">
                    <div class="flex justify-content-between align-items-center mb-2">
                        <div class="flex align-items-center gap-2">
                            <i class="pi pi-circle-fill text-blue-500"></i>
                            <span class="text-900 font-medium">gm</span>
                        </div>
                        <span class="text-500">00:04:10</span>
                        <span class="text-900 font-bold">100,00%</span>
                    </div>
                    <p-progressBar [value]="100" [showValue]="false" class="mb-4" color="#2196F3"></p-progressBar>
                    
                    <div class="flex justify-content-between align-items-center mb-2">
                        <div class="flex align-items-center gap-2">
                            <i class="pi pi-circle text-200"></i>
                            <span class="text-500">Sin proyecto</span>
                        </div>
                        <span class="text-500">00:00:00</span>
                        <span class="text-500">0,00%</span>
                    </div>
                    <p-progressBar [value]="0" [showValue]="false" color="#E3F2FD"></p-progressBar>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12 md:col-3">
        <div class="card shadow-2">
            <h5 class="m-0 mb-4 text-900">Actividades más registradas</h5>
            <ul class="list-none p-0 m-0">
                <li class="flex align-items-center justify-content-between py-2 border-bottom-1 border-200">
                    <div class="flex align-items-center">
                        <i class="pi pi-square-fill text-blue-500 mr-2 text-xs"></i>
                        <span class="text-900 font-medium">panel de control</span>
                    </div>
                    <span class="text-700">00:04:10</span>
                </li>
                 <li class="flex align-items-center justify-content-between py-2">
                    <div class="flex align-items-center pl-3">
                        <span class="text-700">gm</span>
                    </div>
                    <span class="text-400"></span>
                </li>
            </ul>
        </div>
    </div>
</div>
