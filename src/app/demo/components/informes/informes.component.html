<div class="informes-pagina p-5">
  <div class="Informes-panel">
    <h2 class="titulo-seccion mb-4 ml-2">Informes</h2>

    <p-card styleClass="shadow-1 border-round">
      
      <div class="flex align-items-center justify-content-between flex-nowrap mb-4 px-2">
        <div class="flex align-items-center gap-3 flex-nowrap">
          
          <p-dropdown 
            [options]="opcionesInformes" 
            [(ngModel)]="tipoInformeSeleccionado" 
            placeholder="INFORME TIPO" 
            styleClass="w-auto">
          </p-dropdown>

          <p-tabMenu 
            [model]="tabs" 
            [activeItem]="tabactivo" 
            (activeItemChange)="CambioTab($event)"
            styleClass="w-auto">
          </p-tabMenu>
        </div>

        <p-calendar 
          view="month" 
          dateFormat="dd/mm/yy" 
          [(ngModel)]="selectedDate"
          [readonlyInput]="true" 
          [showIcon]="true">
        </p-calendar>
      </div>

      <div class="m-3" *ngIf="tabactivo?.id === '0' || tabactivo?.id === '1' || tabactivo?.id === '2'">
        
        <div class="surface-100 border-y-1 surface-border mb-3">
          <div class="flex align-items-stretch w-full overflow-x-auto bg-white">
            
            <div class="flex align-items-center border-right-1 surface-border bg-gray-50 px-3 py-2" 
                 style="border-right-style: dashed !important; min-width: 100px;">
              <span class="text-500 font-bold text-xs uppercase">Filtrar</span>
            </div>
            
            <div class="flex-1 flex align-items-center border-right-1 surface-border" style="border-right-style: dashed !important;">
              <p-dropdown [options]="[{label:'Todo', value:'A'}]" placeholder="Equipo" class="w-full" [style]="{'border':'none', 'background':'transparent'}"></p-dropdown>
            </div>
            
            <div class="flex-1 flex align-items-center border-right-1 surface-border" style="border-right-style: dashed !important;">
              <p-dropdown [options]="[{label:'Todo', value:'A'}]" placeholder="Cliente" class="w-full" [style]="{'border':'none', 'background':'transparent'}"></p-dropdown>
            </div>
            
            <div class="flex-1 flex align-items-center border-right-1 surface-border" style="border-right-style: dashed !important;">
              <p-dropdown [options]="[{label:'Todo', value:'A'}]" placeholder="Proyecto" class="w-full" [style]="{'border':'none', 'background':'transparent'}"></p-dropdown>
            </div>

            <div class="flex-1 flex align-items-center border-right-1 surface-border" style="border-right-style: dashed !important;">
                <p-dropdown [options]="[{label:'Todo', value:'A'}]" placeholder="Tarea" class="w-full" [style]="{'border':'none', 'background':'transparent'}"></p-dropdown>
            </div>

            <div class="px-3 flex align-items-center">
              <button pButton label="Aplicar Filtro" class="p-button-info p-button-sm font-bold" style="border-radius: 4px; padding: 10px 20px;"></button>
            </div>
          </div>
        </div>

        <p-table [value]="equipos" class="tabla-personalizada" [scrollable]="true" scrollHeight="400px">
          <ng-template pTemplate="header">
            <tr class="cabecera-gris">
              <th style="width: 4rem"><p-checkbox [binary]="true"></p-checkbox></th>
              <th>NOMBRE</th>
              <th>CORREO</th>
              <th>TARIFA</th>
              <th>TARIFA COSTE</th>
              <th>ROL</th>
              <th>GRUPO</th>
              <th style="width: 8rem"></th>
            </tr>
          </ng-template>
          
          <ng-template pTemplate="body" let-equipo>
            <tr>
              <td><p-checkbox [binary]="true"></p-checkbox></td>
              <td>{{ equipo.nombre }}</td>
              <td>{{ equipo.correo }}</td>
              <td>{{ equipo.tarifa }}</td>
              <td>{{ equipo.tarifa_coste }}</td>
              <td>{{ equipo.rol }}</td>
              <td>{{ equipo.grupo }}</td>
              <td class="acciones-celda text-right">
                <button pButton icon="pi pi-pencil" class="p-button-text p-button-secondary"></button>
                <button pButton icon="pi pi-ellipsis-v" class="p-button-text p-button-secondary"></button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>

      <div class="m-3" *ngIf="tabactivo?.id === '3'">
        <div class="p-8 text-center surface-50 border-round-xl border-1 surface-border">
            <i class="pi pi-share-alt text-6xl mb-4 text-400"></i>
            <h3 class="text-900 font-bold text-2xl mb-2">Informes Compartidos</h3>
            <p class="text-600">Aquí aparecerán los informes programados y compartidos con tu equipo.</p>
            <button pButton label="Crear primer informe compartido" class="p-button-outlined mt-4"></button>
        </div>
      </div>

    </p-card>
  </div>
</div>
