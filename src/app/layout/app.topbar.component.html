<div class="layout-topbar" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">

    <div class="left-section" style="display: flex; align-items: center; gap: 10px;">
        <button #menubutton class="p-link layout-menu-button layout-topbar-button"
            (click)="layoutService.onMenuToggle()">
            <i class="pi pi-bars"></i>
        </button>

        <p-splitButton [appendTo]="'body'" label="Clockify" (onClick)="espaciostrabajo()" [model]="proyectos" size="lg"
            text>
            <ng-template pTemplate="content">
                <span class="flex align-items-center font-bold text-primary-600">
                    <span>Clockify</span>
                </span>
            </ng-template>
        </p-splitButton>

        <ng-container *ngIf="canVerConfig$ | async">
            <button class="p-link layout-menu-button layout-topbar-button" (click)="menuTuerca.toggle($event)">
                <i class="pi pi-cog" style="font-size: 2rem"></i>
            </button>
            <p-tieredMenu #menuTuerca [model]="opcionesTuerca" [popup]="true" appendTo="body">
            </p-tieredMenu>
        </ng-container>
    </div>

    <div class="right-section" style="display: flex; align-items: center; gap: 10px; margin-left: auto;">
        <button class="p-link layout-topbar-button layout-topbar-profile-mobile avatar-btn" (click)="op.toggle($event)">
            <span class="avatar-iniciales">{{ getIniciales() }}</span>
        </button>
    </div>

    <p-overlayPanel #op [showCloseIcon]="false" styleClass="border-round-xl perfil-panel">
        <!-- Avatar grande + nombre + correo -->
        <div class="flex flex-column align-items-center gap-2 pb-3"
            style="border-bottom: 1px solid var(--surface-border);">
            <div class="avatar-grande">
                {{ getIniciales() }}
            </div>
            <div class="text-lg font-bold text-900 text-center">{{ nombre }}</div>
            <div class="text-sm text-500 text-center">{{ correo }}</div>
        </div>

        <!-- Opciones -->
        <div class="flex flex-column mt-2 gap-1">
            <div class="perfil-opcion" (click)="micuenta(); op.hide()">
                <i class="pi pi-user text-500"></i>
                <span>Mi perfil</span>
            </div>
            <div class="perfil-opcion text-red-500" (click)="cerrarSesion()">
                <i class="pi pi-sign-out"></i>
                <span>Cerrar sesión</span>
            </div>
        </div>
    </p-overlayPanel>
</div>
