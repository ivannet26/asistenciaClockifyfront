<div class="layout-wrapper" [ngClass]="containerClass">
    <app-topbar></app-topbar>
    <div class="layout-sidebar" [ngClass]="{'layout-sidebar-active': layoutService.state.staticMenuMobileActive || layoutService.state.overlayMenuActive}">
    <app-sidebar *ngIf="!isNuevaRuta"></app-sidebar>
    <app-menu-layout *ngIf="isNuevaRuta"></app-menu-layout>
</div>
    <div class="layout-main-container">
        <div class="layout-main">
            <router-outlet></router-outlet>
        </div>
        <app-footer></app-footer>
    </div>
    <!-- <app-config></app-config> -->

    <div class="layout-mask"></div>
</div>
